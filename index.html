<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store Dashboard Portal</title>

<style>
body{
  font-family:Arial;
  background:#f4f6f9;
  padding:20px;
}
.container{
  max-width:900px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
h2{text-align:center;}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}
th,td{
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
}
th{
  background:#007bff;
  color:white;
}

.done{
  color:green;
  font-weight:bold;
}

.pending{
  color:red;
  font-weight:bold;
}

select,button{
  width:100%;
  padding:10px;
  margin:8px 0;
}
button{
  background:#007bff;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
hr{margin:25px 0;}
</style>
</head>

<body>

<div class="container">

<h2>Dashboard Portal</h2>

<table>
<thead>
<tr>
<th>Store</th>
<th>Work 1</th>
<th>Work 2</th>
<th>Work 3</th>
</tr>
</thead>
<tbody id="dashboard"></tbody>
</table>

<hr>

<h2>Update Store Work</h2>

<select id="store">
<option>st1</option>
<option>st2</option>
<option>st4</option>
<option>s4</option>
</select>

<select id="work1">
<option>Done</option>
<option>Pending</option>
</select>

<select id="work2">
<option>Done</option>
<option>Pending</option>
</select>

<select id="work3">
<option>Done</option>
<option>Pending</option>
</select>

<button onclick="submitData()">Update</button>

</div>

<script>

const listedStores = ["st1","st2","st4","s4"];

let storeData = JSON.parse(localStorage.getItem("storeData")) || {};

function submitData(){
  const store = document.getElementById("store").value;

  storeData[store] = {
    work1: document.getElementById("work1").value,
    work2: document.getElementById("work2").value,
    work3: document.getElementById("work3").value
  };

  localStorage.setItem("storeData", JSON.stringify(storeData));
  displayData();
}

function displayData(){
  const dashboard = document.getElementById("dashboard");
  dashboard.innerHTML="";

  listedStores.forEach(store=>{

    const data = storeData[store] || {
      work1:"Pending",
      work2:"Pending",
      work3:"Pending"
    };

    dashboard.innerHTML += `
      <tr>
        <td>${store}</td>
        <td class="${data.work1.toLowerCase()}">${data.work1}</td>
        <td class="${data.work2.toLowerCase()}">${data.work2}</td>
        <td class="${data.work3.toLowerCase()}">${data.work3}</td>
      </tr>
    `;
  });
}

displayData();

</script>

</body>
</html>
